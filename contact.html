<main>
    <h2>Contact Me</h2>

    <section class="contact-form">
        <p>If you have any questions, suggestions, or just want to say hello, feel free to send me a message using the form below!</p>

        <form action="#" method="post">
            <label for="name">Your Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

            <label for="email">Your Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea><br><br>

            <button type="submit">Send Message</button>
        </form>
    </section>
</main>
